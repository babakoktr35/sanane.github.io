
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body { background: transparent; }

  .page {
    min-height: 100vh;
    background: linear-gradient(135deg, #ffe0ec 0%, #ffd6e8 30%, #fce4f3 60%, #f5d0f0 100%);
    padding: 40px 20px;
    font-family: 'Lato', sans-serif;
    position: relative;
    overflow: hidden;
  }

  .hearts-bg {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 0;
  }

  .heart-float {
    position: absolute;
    font-size: 18px;
    opacity: 0.15;
    animation: floatUp linear infinite;
    user-select: none;
  }

  @keyframes floatUp {
    0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
    10% { opacity: 0.15; }
    90% { opacity: 0.15; }
    100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
  }

  .container {
    max-width: 560px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  .header {
    text-align: center;
    margin-bottom: 36px;
  }

  .header-hearts {
    font-size: 32px;
    display: block;
    margin-bottom: 8px;
    animation: pulse 1.8s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.15); }
  }

  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    color: #c2185b;
    font-weight: 700;
    line-height: 1.2;
  }

  .header p {
    font-size: 14px;
    color: #e91e8c;
    margin-top: 8px;
    opacity: 0.8;
    font-weight: 300;
    letter-spacing: 0.5px;
  }

  .card {
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(12px);
    border-radius: 24px;
    border: 1.5px solid rgba(255, 120, 170, 0.3);
    padding: 32px 28px;
    margin-bottom: 20px;
    box-shadow: 0 8px 32px rgba(194, 24, 91, 0.08);
  }

  .section-label {
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #e91e8c;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .section-label::before {
    content: '';
    display: inline-block;
    width: 16px;
    height: 1px;
    background: #e91e8c;
    opacity: 0.5;
  }

  input[type="text"], textarea, select {
    width: 100%;
    background: rgba(255, 240, 248, 0.7);
    border: 1px solid rgba(233, 30, 140, 0.2);
    border-radius: 14px;
    padding: 14px 18px;
    font-family: 'Lato', sans-serif;
    font-size: 15px;
    color: #880e4f;
    outline: none;
    transition: all 0.2s;
    resize: none;
  }

  input[type="text"]:focus, textarea:focus, select:focus {
    border-color: #e91e8c;
    background: rgba(255, 240, 248, 1);
    box-shadow: 0 0 0 3px rgba(233, 30, 140, 0.08);
  }

  input::placeholder, textarea::placeholder {
    color: rgba(194, 24, 91, 0.35);
  }

  select option {
    color: #333;
    background: white;
  }

  .theme-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-top: 4px;
  }

  .theme-btn {
    padding: 12px 8px;
    border-radius: 14px;
    border: 1.5px solid rgba(233, 30, 140, 0.2);
    background: rgba(255, 240, 248, 0.5);
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
    font-size: 13px;
    color: #c2185b;
    font-family: 'Lato', sans-serif;
  }

  .theme-btn .emoji { font-size: 20px; display: block; margin-bottom: 4px; }

  .theme-btn:hover, .theme-btn.active {
    background: #e91e8c;
    border-color: #e91e8c;
    color: white;
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(233, 30, 140, 0.25);
  }

  .send-btn {
    width: 100%;
    padding: 18px;
    background: linear-gradient(135deg, #e91e8c, #c2185b);
    border: none;
    border-radius: 18px;
    color: white;
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-style: italic;
    cursor: pointer;
    transition: all 0.25s;
    letter-spacing: 0.5px;
    box-shadow: 0 6px 24px rgba(233, 30, 140, 0.35);
  }

  .send-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 32px rgba(233, 30, 140, 0.45);
  }

  .send-btn:active { transform: translateY(0); }

  .preview-card {
    display: none;
    background: white;
    border-radius: 24px;
    border: 1.5px solid rgba(233, 30, 140, 0.25);
    padding: 32px 28px;
    text-align: center;
    margin-bottom: 20px;
    box-shadow: 0 8px 32px rgba(194, 24, 91, 0.1);
    animation: fadeInUp 0.5s ease;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .preview-emoji { font-size: 40px; margin-bottom: 12px; display: block; }

  .preview-to {
    font-size: 12px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #e91e8c;
    opacity: 0.6;
    margin-bottom: 4px;
  }

  .preview-name {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    color: #c2185b;
    margin-bottom: 20px;
  }

  .preview-message {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 17px;
    color: #880e4f;
    line-height: 1.7;
    padding: 20px;
    background: rgba(255, 240, 248, 0.6);
    border-radius: 16px;
    border-left: 3px solid #e91e8c;
    margin-bottom: 20px;
    text-align: left;
  }

  .preview-from {
    font-size: 13px;
    color: #e91e8c;
    opacity: 0.7;
  }

  .share-bar {
    display: flex;
    gap: 10px;
    margin-top: 16px;
  }

  .share-btn {
    flex: 1;
    padding: 13px;
    border-radius: 14px;
    border: 1.5px solid rgba(233, 30, 140, 0.25);
    background: transparent;
    font-family: 'Lato', sans-serif;
    font-size: 13px;
    color: #c2185b;
    cursor: pointer;
    transition: all 0.2s;
  }

  .share-btn:hover {
    background: rgba(233, 30, 140, 0.08);
    border-color: #e91e8c;
  }

  .copy-success {
    display: none;
    text-align: center;
    color: #e91e8c;
    font-size: 13px;
    margin-top: 8px;
    animation: fadeInUp 0.3s ease;
  }
</style>

<div class="page">
  <div class="hearts-bg" id="heartsBg"></div>

  <div class="container">
    <div class="header">
      <span class="header-hearts">💌 ♡ 💕</span>
      <h1>Ona Mesaj Gönder</h1>
      <p>Kalbinden gelenlerle onu gülümsет</p>
    </div>

    <div class="card" id="formCard">
      <div style="margin-bottom: 22px;">
        <div class="section-label">Kime gönderiyorsun?</div>
        <input type="text" id="toName" placeholder="Canım kız arkadaşımın adı..." />
      </div>

      <div style="margin-bottom: 22px;">
        <div class="section-label">Kimden?</div>
        <input type="text" id="fromName" placeholder="Senin adın..." />
      </div>

      <div style="margin-bottom: 22px;">
        <div class="section-label">Mesajın</div>
        <textarea id="message" rows="4" placeholder="Kalbinden gelenler... Ne hissediyorsan yaz, o anlayacak 🌸"></textarea>
      </div>

      <div style="margin-bottom: 28px;">
        <div class="section-label">Mesajın havası</div>
        <div class="theme-grid">
          <button class="theme-btn active" onclick="selectTheme(this, '💕', 'Romantik')">
            <span class="emoji">💕</span>Romantik
          </button>
          <button class="theme-btn" onclick="selectTheme(this, '🌸', 'Tatlı')">
            <span class="emoji">🌸</span>Tatlı
          </button>
          <button class="theme-btn" onclick="selectTheme(this, '✨', 'Büyülü')">
            <span class="emoji">✨</span>Büyülü
          </button>
          <button class="theme-btn" onclick="selectTheme(this, '🌙', 'Derin')">
            <span class="emoji">🌙</span>Derin
          </button>
          <button class="theme-btn" onclick="selectTheme(this, '🦋', 'Hafif')">
            <span class="emoji">🦋</span>Hafif
          </button>
          <button class="theme-btn" onclick="selectTheme(this, '🔥', 'Ateşli')">
            <span class="emoji">🔥</span>Ateşli
          </button>
        </div>
      </div>

      <button class="send-btn" onclick="previewMessage()">Mesajı Hazırla ♡</button>
    </div>

    <div class="preview-card" id="previewCard">
      <span class="preview-emoji" id="previewEmoji">💕</span>
      <div class="preview-to">Sevgili</div>
      <div class="preview-name" id="previewName">—</div>
      <div class="preview-message" id="previewMsg">—</div>
      <div class="preview-from" id="previewFrom">— ile sonsuz sevgiyle ♡</div>

      <div class="share-bar">
        <button class="share-btn" onclick="copyMessage()">📋 Kopyala</button>
        <button class="share-btn" onclick="shareWhatsApp()">💬 WhatsApp</button>
        <button class="share-btn" onclick="resetForm()">✏️ Düzenle</button>
      </div>
      <div class="copy-success" id="copySuccess">✓ Kopyalandı! Şimdi yapıştırıp gönderebilirsin 🌸</div>
    </div>
  </div>
</div>

<script>
  let selectedEmoji = '💕';

  function selectTheme(btn, emoji, label) {
    document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedEmoji = emoji;
  }

  function createFloatingHearts() {
    const bg = document.getElementById('heartsBg');
    const hearts = ['♡', '♥', '💕', '💗', '💖', '✿', '❋'];
    for (let i = 0; i < 18; i++) {
      const el = document.createElement('span');
      el.className = 'heart-float';
      el.textContent = hearts[Math.floor(Math.random() * hearts.length)];
      el.style.left = Math.random() * 100 + '%';
      el.style.animationDuration = (8 + Math.random() * 12) + 's';
      el.style.animationDelay = (Math.random() * 10) + 's';
      el.style.fontSize = (12 + Math.random() * 16) + 'px';
      bg.appendChild(el);
    }
  }

  function previewMessage() {
    const to = document.getElementById('toName').value.trim();
    const from = document.getElementById('fromName').value.trim();
    const msg = document.getElementById('message').value.trim();

    if (!to || !msg) {
      const input = !to ? document.getElementById('toName') : document.getElementById('message');
      input.style.borderColor = '#e91e8c';
      input.focus();
      setTimeout(() => input.style.borderColor = '', 2000);
      return;
    }

    document.getElementById('previewEmoji').textContent = selectedEmoji;
    document.getElementById('previewName').textContent = to;
    document.getElementById('previewMsg').textContent = msg;
    document.getElementById('previewFrom').textContent = (from || 'Seni çok seven biri') + ' ile sonsuz sevgiyle ♡';

    document.getElementById('formCard').style.display = 'none';
    document.getElementById('previewCard').style.display = 'block';
    document.getElementById('copySuccess').style.display = 'none';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function resetForm() {
    document.getElementById('formCard').style.display = 'block';
    document.getElementById('previewCard').style.display = 'none';
  }

  function copyMessage() {
    const to = document.getElementById('previewName').textContent;
    const msg = document.getElementById('previewMsg').textContent;
    const from = document.getElementById('previewFrom').textContent;
    const full = `Sevgili ${to},\n\n${msg}\n\n${from}`;
    navigator.clipboard.writeText(full).then(() => {
      const s = document.getElementById('copySuccess');
      s.style.display = 'block';
      setTimeout(() => s.style.display = 'none', 3000);
    }).catch(() => {
      const s = document.getElementById('copySuccess');
      s.textContent = '❌ Kopyalanamadı, lütfen elle kopyala.';
      s.style.display = 'block';
    });
  }

  function shareWhatsApp() {
    const to = document.getElementById('previewName').textContent;
    const msg = document.getElementById('previewMsg').textContent;
    const from = document.getElementById('previewFrom').textContent;
    const full = encodeURIComponent(`Sevgili ${to},\n\n${msg}\n\n${from}`);
    window.open('https://wa.me/?text=' + full, '_blank');
  }

  createFloatingHearts();
</script>
